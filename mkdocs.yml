site_name: SciAgent Docs
site_description: SciAgent documentation site built from Markdown sources in the repository.
site_url: https://adamkrysztopa.github.io/sciagent/
repo_url: https://github.com/AdamKrysztopa/sciagent
repo_name: AdamKrysztopa/sciagent
docs_dir: docs
theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - content.code.copy
plugins:
  - search
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
nav:
  - Overview:
      - Home: index.md
  - Get Started:
      - Installation: install.md
      - API Keys: keys.md
      - User Manual: user-manual.md
  - Power User:
      - Advanced Configuration: advanced-config.md
      - Configuration & Usage: manual.md
      - Deployment & Hosting: deployment.md
  - Reference:
      - REST API: api.md
      - Provider Inventory: providers.md
      - Settings: settings.md
      - Zotero Add-on: zotero.md
      - Security: security.md
      - P1 Benchmark: benchmark.md
      - Local-First Install: local-first.md
  - Project:
      - Core Roadmap: core.md
      - Action Plan: actionable-plan.md
      - Priorities: priorities.md
      - Next Steps: next-steps.md
