<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SciAgent</title>
  <link rel="stylesheet" href="chrome://agt/content/bootstrap-runtime.css" />
  <style>
    html,
    body {
      color-scheme: light dark;
      background: Canvas;
      color: CanvasText;
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    #agt-panel-root {
      width: 100%;
      height: 100%;
      overflow-y: auto;
    }
    #agt-panel-root:empty::before {
      box-sizing: border-box;
      color: CanvasText;
      content: "SciAgent did not render. Rebuild and reinstall the add-on, then check the Zotero Error Console.";
      display: block;
      font: 13px system-ui, -apple-system, sans-serif;
      padding: 16px;
    }
    .agt-panel-loading,
    .agt-panel-startup-error {
      box-sizing: border-box;
      color: CanvasText;
      font: 13px system-ui, -apple-system, sans-serif;
      padding: 16px;
    }
    .agt-panel-startup-error {
      color: #c0392b;
    }
  </style>
</head>
<body>
  <div id="agt-panel-root">
    <div class="agt-panel-loading">Loading SciAgent...</div>
  </div>
  <script src="chrome://agt/content/panel-entry.js"></script>
</body>
</html>
